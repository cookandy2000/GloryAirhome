<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>产品展示官网</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }
        /* 导航栏 */
        nav {
            background: #222;
            color: white;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 99;
        }
        .logo {
            font-size: 22px;
            font-weight: bold;
        }
        .nav-links a {
            color: white;
            margin-left: 25px;
            text-decoration: none;
        }
        .nav-links a:hover {
            color: #42a5f5;
        }
        /* Banner */
        .banner {
            height: 400px;
            background: #42a5f5;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: bold;
        }
        /* 通用容器 */
        .container {
            max-width: 1200px;
            margin: 50px auto;
            padding: 0 20px;
        }
        .title {
            text-align: center;
            font-size: 26px;
            margin-bottom: 40px;
            color: #333;
        }
        /* 产品区域 */
        .product-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
        }
        .product-card {
            border: 1px solid #eee;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .product-img {
            height: 200px;
            background: #ddd;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            color: #666;
        }
        .product-info {
            padding: 15px;
        }
        .product-name {
            font-size: 18px;
            margin-bottom: 8px;
        }
        .product-desc {
            font-size: 14px;
            color: #666;
            line-height: 1.5;
        }
        /* 表单区域 */
        .form-box {
            max-width: 600px;
            margin: 60px auto;
            padding: 30px;
            border: 1px solid #eee;
            border-radius: 10px;
            box-shadow: 0 3px 15px rgba(0,0,0,0.08);
        }
        .form-box input,
        .form-box textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 15px;
        }
        .form-box button {
            background: #42a5f5;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
        }
        .form-box button:hover {
            background: #1e88e5;
        }
        /* 页脚 */
        footer {
            background: #222;
            color: white;
            text-align: center;
            padding: 25px;
            margin-top: 50px;
        }
    </style>
</head>
<body>
<!-- 导航 -->
<nav>
    <div class="logo">产品展示官网</div>
    <div class="nav-links">
        <a href="#home">首页</a>
        <a href="#products">产品</a>
        <a href="#contact">联系我们</a>
    </div>
</nav>

<!-- Banner -->
<section id="home" class="banner">
    优质产品 · 专业服务
</section>

<!-- 产品展示 -->
<section id="products" class="container">
    <h2 class="title">产品展示</h2>
    <div class="product-list">
        <div class="product-card">
            <div class="product-img">产品图片 1</div>
            <div class="product-info">
                <div class="product-name">智能设备 A1</div>
                <div class="product-desc">高性能、稳定可靠，适用于各类场景。</div>
            </div>
        </div>
        <div class="product-card">
            <div class="product-img">产品图片 2</div>
            <div class="product-info">
                <div class="product-name">智能家居套装</div>
                <div class="product-desc">一键控制全屋设备，安全便捷。</div>
            </div>
        </div>
        <div class="product-card">
            <div class="product-img">产品图片 3</div>
            <div class="product-info">
                <div class="product-name">便携式记录仪</div>
                <div class="product-desc">小巧轻便，高清录制，超长续航。</div>
            </div>
        </div>
            </div>
        </div>
    </div>
</section>

<!-- 联系表单 核心修改处 -->
<section id="contact" class="container">
    <h2 class="title">联系我们</h2>
    <div class="form-box">
        <!-- 把 action 里的邮箱换成你自己的 -->
        <form action="https://formsubmit.co/25527949@qq.com" method="POST">
            <!-- 跳转提示页（可选） -->
            <input type="hidden" name="_next" value="https://www.baidu.com">
            <input type="text" name="姓名" placeholder="您的姓名" required>
            <input type="tel" name="电话" placeholder="您的电话" required>
            <textarea name="留言" rows="4" placeholder="留言内容"></textarea>
            <button type="submit">提交信息</button>
        </form>
    </div>
</section>

<!-- 页脚 -->
<footer>
    © 2026 产品展示官网 版权所有
</footer>
</body>
</html>
